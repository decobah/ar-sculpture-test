<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sculpture AR</title>

  <script src="WebARRocksObject.js"></script>
  <script src="WebARRocksMediaStreamAPIHelper.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: monospace; }
    #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #threeCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #debugWebARRocksObjectCanvas { position: fixed; top: -9999px; left: -9999px; visibility: hidden; }
    #status {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; letter-spacing: 0.05em;
      pointer-events: none; white-space: nowrap;
    }
    #status.detected { background: rgba(0,200,100,0.75); }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="debugWebARRocksObjectCanvas"></canvas>
  <canvas id="threeCanvas"></canvas>
  <div id="status">Starting camera...</div>

  <script>
    const statusEl = document.getElementById('status');
    const videoEl  = document.getElementById('video');

    // ── THREE.JS SCENE ──────────────────────────────────────────────────────

    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('threeCanvas'),
      alpha: true,
      antialias: true
    });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 1);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(1, 2, 3);
    scene.add(dirLight);

    const cubeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
    const cubeMat = new THREE.MeshStandardMaterial({ color: 0x00ccff, roughness: 0.3, metalness: 0.5, transparent: true, opacity: 0.9 });
    const cube    = new THREE.Mesh(cubeGeo, cubeMat);
    const edges   = new THREE.LineSegments(new THREE.EdgesGeometry(cubeGeo), new THREE.LineBasicMaterial({ color: 0xffffff }));

    cube.visible  = false;
    edges.visible = false;
    cube.position.y  = 0.25;
    edges.position.y = 0.25;

    const pivot = new THREE.Object3D();
    pivot.add(cube);
    pivot.add(edges);
    scene.add(pivot);

    // ── DETECTION ───────────────────────────────────────────────────────────

    let isDetected = false;

    function handleDetection(detectState) {
      const detected = detectState.label === 'HOODED_FIGURE' && detectState.detectScore > 0.3;

      if (detected) {
        if (!isDetected) {
          isDetected    = true;
          cube.visible  = true;
          edges.visible = true;
          statusEl.textContent = 'Sculpture detected';
          statusEl.classList.add('detected');
        }
        const ps = detectState.positionScale;
        if (ps) {
          pivot.position.x = (ps[0] - 0.5) * 2;
          pivot.position.y = (ps[1] - 0.5) * -2;
          pivot.position.z = -1 + ps[2];
        }
        pivot.rotation.y = detectState.yaw || 0;
      } else {
        if (isDetected) {
          isDetected    = false;
          cube.visible  = false;
          edges.visible = false;
          statusEl.textContent = 'Point camera at sculpture';
          statusEl.classList.remove('detected');
        }
      }
    }

    // ── RENDER LOOP ─────────────────────────────────────────────────────────

    function renderLoop() {
      requestAnimationFrame(renderLoop);
      const detectState = WEBARROCKSOBJECT.detect(3, null, {
        thresholdDetectFactor: 0.5,
        isSkipConfirmation: true,
        isKeepTracking: true
      });
      handleDetection(detectState);
      if (cube.visible) {
        cube.rotation.y  += 0.01;
        cube.rotation.x  += 0.005;
        edges.rotation.copy(cube.rotation);
      }
      renderer.render(scene, camera);
    }

    // ── INIT ────────────────────────────────────────────────────────────────

    function initAR() {
      WEBARROCKSOBJECT.init({
        canvasId: 'debugWebARRocksObjectCanvas',
        video: videoEl,
        callbackReady: function(errCode) {
          if (errCode) {
            console.error('Init error:', errCode);
            statusEl.textContent = 'AR error: ' + errCode;
            return;
          }
          console.log('WebARRocksObject ready — loading neural network...');
          statusEl.textContent = 'Loading neural network...';

          WEBARROCKSOBJECT.set_NN('Hooded_Figure.json', function(errCodeNN) {
            if (errCodeNN) {
              console.error('NN load error:', errCodeNN);
              statusEl.textContent = 'NN load error: ' + errCodeNN;
              return;
            }
            console.log('Neural network loaded — detecting');
            statusEl.textContent = 'Point camera at sculpture';
            renderLoop();
          });
        }
      });
    }

    // ── CAMERA ──────────────────────────────────────────────────────────────

    WebARRocksMediaStreamAPIHelper.get(
      videoEl,
      initAR,
      function() {
        statusEl.textContent = 'Camera access denied';
        console.error('Cannot access camera');
      },
      { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false }
    );

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
